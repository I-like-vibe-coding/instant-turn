<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Instant Turn (인턴)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f5f7fb; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-container { width: 540px; background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05); text-align: center; }
        
        /* 타이틀 바 */
        h1 { color: #1e293b; margin: 0 0 5px 0; font-size: 26px; font-weight: 800; letter-spacing: -0.5px; }
        h1 span { color: #6366f1; }
        .main-tag { color: #94a3b8; font-size: 13px; font-weight: 500; margin-bottom: 25px; }
        
        /* 페이지 언어 선택 가이드 라벨 */
        .tab-section-title { font-size: 11px; font-weight: 800; color: #6366f1; text-align: left; margin-bottom: 6px; letter-spacing: 0.5px; text-transform: uppercase; }

        /* ⚡ 상단 페이지 언어 변경 탭 (본토 문자 표기로 디자인 맞춤 조정) */
        .lang-tabs { display: flex; justify-content: space-between; gap: 5px; margin-bottom: 25px; flex-wrap: wrap; }
        .tab-btn { flex: 1; min-width: 52px; background: #f1f5f9; color: #64748b; border: none; padding: 8px 0; font-size: 10.5px; font-weight: 700; border-radius: 10px; cursor: pointer; transition: all 0.15s ease; text-align: center; white-space: nowrap; }
        .tab-btn:hover { background: #e2e8f0; color: #334155; }
        .tab-btn.active { background: #6366f1; color: white; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2); }

        /* 🛠️ 언어 설정 구역 */
        .lang-settings { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 12px 20px; border-radius: 16px; margin-bottom: 25px; border: 1px solid #f1f5f9; }
        select { padding: 8px 5px; border: none; font-size: 14px; font-weight: 700; color: #6366f1; outline: none; background: transparent; cursor: pointer; width: 44%; text-align-last: center; }
        .arrow { font-size: 16px; color: #cbd5e1; font-weight: bold; }

        /* 🎤 마이크 버튼 */
        .mic-btn { width: 100%; background: #6366f1; color: white; border: none; padding: 14px; font-size: 15px; font-weight: 700; border-radius: 14px; cursor: pointer; transition: all 0.2s ease; box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2); margin-bottom: 25px; }
        .mic-btn:hover { background: #4f46e5; transform: translateY(-1px); }
        .listening { animation: pulse 1.5s infinite; background: #10b981 !important; box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2); }
        
        /* 🧱 컴팩트한 입출력 상자 */
        .part-card { text-align: left; margin-bottom: 18px; }
        .part-title { font-size: 12px; font-weight: 700; color: #94a3b8; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .display-box { background: #f8fafc; min-height: 45px; padding: 12px 16px; border-radius: 12px; font-size: 15px; color: #334155; line-height: 1.5; border: 1px solid #f1f5f9; word-break: break-all; box-sizing: border-box; }
        
        /* 번역 결과 강조 */
        .result-box { border: 1px solid #e0e7ff; background: #f5f7ff; color: #4338ca; font-weight: 600; }
        
        /* 🔊 슬림 버튼 */
        .speak-btn { width: 100%; background: #10b981; color: white; border: none; padding: 12px; font-size: 14px; font-weight: 700; border-radius: 12px; cursor: pointer; transition: 0.2s; display: none; margin-top: 10px; }
        .speak-btn:hover { background: #059669; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.85; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="app-container">
    <h1 id="uiTitle">⚡ Instant Turn <span>(인턴)</span></h1>
    <div class="main-tag" id="uiSubTitle">AI 실시간 동시통역 비서</div>

    <div class="tab-section-title" id="uiTabDesc">🌐 페이지 언어 선택 (Page Language)</div>
    <div class="lang-tabs">
        <button class="tab-btn active" onclick="changeUiLanguage('ko')">한국어</button>
        <button class="tab-btn" onclick="changeUiLanguage('en')">English</button>
        <button class="tab-btn" onclick="changeUiLanguage('ja')">日本語</button>
        <button class="tab-btn" onclick="changeUiLanguage('zh')">简体中文</button>
        <button class="tab-btn" onclick="changeUiLanguage('hk')">廣東話</button>
        <button class="tab-btn" onclick="changeUiLanguage('es')">Español</button>
        <button class="tab-btn" onclick="changeUiLanguage('fr')">Français</button>
        <button class="tab-btn" onclick="changeUiLanguage('de')">Deutsch</button>
        <button class="tab-btn" onclick="changeUiLanguage('vi')">Tiếng Việt</button>
    </div>

    <div class="lang-settings">
        <select id="srcLang" onchange="resetApp()">
            </select>
        <span class="arrow">➔</span>
        <select id="tgtLang" onchange="resetApp()">
            </select>
    </div>

    <button class="mic-btn" id="micBtn" onclick="toggleSpeech()">🎤 마이크를 누르고 말씀하세요</button>

    <div class="part-card">
        <div class="part-title" id="uiLabelSrc">이해한 내용</div>
        <div class="display-box" id="speechResult">음성 인식 자막이 여기에 표시됩니다.</div>
    </div>

    <div class="part-card">
        <div class="part-title" id="uiLabelTgt">통역 결과</div>
        <div class="display-box result-box" id="translateResult">실시간 통역 결과가 여기에 표시됩니다.</div>
        <button class="speak-btn" id="speakBtn" onclick="speakResult()">🔊 원어민 발음 듣기</button>
    </div>
</div>

<script>
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isListening = false;
    let lastTranslatedText = ""; 
    let currentSystemLang = 'ko'; 

    // 하단 선택창 내부 언어 본토 고유 문자 표기 고정 리스트
    const nativeLanguageNames = [
        '🇰🇷 한국어', 
        '🇺🇸 English', 
        '🇯🇵 日本語', 
        '🇨🇳 简体中文', 
        '🇭🇰 廣東話', 
        '🇪🇸 Español', 
        '🇫🇷 Français', 
        '🇩🇪 Deutsch', 
        '🇻🇳 Tiếng Việt'
    ];

    // UI 메뉴용 번역 데이터
    const uiData = {
        'ko': { tabDesc: '🌐 페이지 언어 선택 (Page Language)', sub: 'AI 실시간 동시통역 비서', mic: '🎤 마이크를 누르고 말씀하세요', src: '이해한 내용', tgt: '통역 결과', speak: '🔊 원어민 발음 듣기', listenText: '🎧 듣고 있습니다... 말씀하세요' },
        'en': { tabDesc: '🌐 Select Page Language', sub: 'AI Real-time Translation Assistant', mic: '🎤 Click to Speak', src: 'What I Heard', tgt: 'Translation Result', speak: '🔊 Listen to Native Pronunciation', listenText: '🎧 Listening... Speak now' },
        'ja': { tabDesc: '🌐 ページ言語を選択', sub: 'AI リアルタイム同時通訳秘書', mic: '🎤 クリックして話す', src: '認識された内容', tgt: '通訳結果', speak: '🔊 ネイティブ発音を聞く', listenText: '🎧 聴取中... お話しください' },
        'zh': { tabDesc: '🌐 选择页面语言', sub: 'AI 实时同声传译助手', mic: '🎤 点击开始说话', src: '听懂的内容', tgt: '翻译结果', speak: '🔊 听原声发音', listenText: '🎧 正在倾听... 请说话' },
        'hk': { tabDesc: '🌐 選擇頁面語言', sub: 'AI 即時同聲傳譯助手', mic: '🎤 點擊開始說話', src: '聽懂的內容', tgt: '翻譯結果', speak: '🔊 聽原聲發音', listenText: '🎧 正在傾聽... 請說話' },
        'es': { tabDesc: '🌐 Seleccionar idioma de la página', sub: 'Asistente de Traducción en Tiempo Real', mic: '🎤 Presione para hablar', src: 'Lo que entendí', tgt: 'Resultado de la traducción', speak: '🔊 Escuchar pronunciación nativa', listenText: '🎧 Escuchando... Hable ahora' },
        'fr': { tabDesc: '🌐 Sélectionner la langue de la page', sub: 'Assistant de Traduction en Temps Réel', mic: '🎤 Cliquez pour parler', src: 'Ce que j\'ai compris', tgt: 'Résultat de la traduction', speak: '🔊 Écouter la prononciation', listenText: '🎧 Écoute en cours... Parlez' },
        'de': { tabDesc: '🌐 Seitensprache auswählen', sub: 'AI Echtzeit-Dolmetscher-Assistent', mic: '🎤 Klicken zum Sprechen', src: 'Verstandener Text', tgt: 'Übersetzungsergebnis', speak: '🔊 Native Aussprache hören', listenText: '🎧 Höre zu... Sprechen Sie jetzt' },
        'vi': { tabDesc: '🌐 Chọn ngôn ngữ trang', sub: 'Trợ Lý Phiên Dịch Đồng Thời AI', mic: '🎤 Nhấn để nói', src: 'Nội dung đã hiểu', tgt: 'Kết quả phiên dịch', speak: '🔊 Nghe phát âm bản xứ', listenText: '🎧 Đang nghe... Hãy nói đi' }
    };

    const langValuesSrc = ['ko-KR', 'en-US', 'ja-JP', 'zh-CN', 'zh-HK', 'es-ES', 'fr-FR', 'de-DE', 'vi-VN'];
    const langValuesTgt = ['ko', 'en', 'ja', 'zh-CN', 'zh-TW', 'es', 'fr', 'de', 'vi']; 

    function renderSelectOptions() {
        const srcSelect = document.getElementById('srcLang');
        const tgtSelect = document.getElementById('tgtLang');
        
        const currentSrcVal = srcSelect.value || 'ko-KR';
        const currentTgtVal = tgtSelect.value || 'en';

        srcSelect.innerHTML = '';
        tgtSelect.innerHTML = '';

        langValuesSrc.forEach((val, index) => {
            const opt = document.createElement('option');
            opt.value = val;
            opt.innerText = nativeLanguageNames[index]; 
            srcSelect.appendChild(opt);
        });

        langValuesTgt.forEach((val, index) => {
            const opt = document.createElement('option');
            opt.value = val;
            opt.innerText = nativeLanguageNames[index]; 
            tgtSelect.appendChild(opt);
        });

        srcSelect.value = currentSrcVal;
        tgtSelect.value = currentTgtVal;
    }

    function changeUiLanguage(lang) {
        currentSystemLang = lang;
        
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        document.getElementById('uiTabDesc').innerText = uiData[lang].tabDesc;
        document.getElementById('uiSubTitle').innerText = uiData[lang].sub;
        document.getElementById('uiLabelSrc').innerText = uiData[lang].src;
        document.getElementById('uiLabelTgt').innerText = uiData[lang].tgt;
        document.getElementById('speakBtn').innerText = uiData[lang].speak;
        
        if (!isListening) {
            document.getElementById('micBtn').innerText = uiData[lang].mic;
        } else {
            document.getElementById('micBtn').innerText = uiData[lang].listenText;
        }

        renderSelectOptions();
    }

    function initSpeech() {
        if (!SpeechRecognition) return;
        recognition = new SpeechRecognition();
        recognition.lang = document.getElementById('srcLang').value; 
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => {
            isListening = true;
            document.getElementById('micBtn').classList.add('listening');
            document.getElementById('micBtn').innerText = uiData[currentSystemLang].listenText;
            document.getElementById('speakBtn').style.display = 'none';
        };

        recognition.onend = () => {
            isListening = false;
            document.getElementById('micBtn').classList.remove('listening');
            document.getElementById('micBtn').innerText = uiData[currentSystemLang].mic;
        };

        recognition.onresult = async (event) => {
            const speechText = event.results[0][0].transcript;
            document.getElementById('speechResult').innerText = speechText; 
            await translateSpeech(speechText); 
        };
    }

    function toggleSpeech() {
        initSpeech();
        if (!recognition) { alert("크롬 브라우저를 이용해 주세요!"); return; }
        if (isListening) recognition.stop();
        else {
            document.getElementById('speechResult').innerText = "...";
            document.getElementById('translateResult').innerText = "...";
            recognition.start();
        }
    }

    function resetApp() {
        document.getElementById('speechResult').innerText = "...";
        document.getElementById('translateResult').innerText = "...";
        document.getElementById('speakBtn').style.display = 'none';
    }

    async function translateSpeech(text) {
        const transBox = document.getElementById('translateResult');
        const speakBtn = document.getElementById('speakBtn');
        
        const srcFull = document.getElementById('srcLang').value;
        const src = srcFull.split('-')[0]; 
        const tgt = document.getElementById('tgtLang').value; 
        
        const targetUrl = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${src}&tl=${tgt}&dt=t&q=${encodeURIComponent(text)}`;
        
        try {
            const response = await fetch(targetUrl);
            const data = await response.json();
            
            if (data && data[0] && data[0][0] && data[0][0][0]) {
                const resultText = data[0].map(x => x[0]).join('');
                transBox.innerHTML = resultText; 
                lastTranslatedText = resultText; 
                speakBtn.style.display = 'block'; 
            }
        } catch (e) {
            console.error(e);
            transBox.innerText = "Error";
        }
    }

    function speakResult() {
        if (!lastTranslatedText) return;

        const utterance = new SpeechSynthesisUtterance(lastTranslatedText);
        const tgt = document.getElementById('tgtLang').value;
        
        if(tgt === 'en') utterance.lang = 'en-US';
        else if(tgt === 'ko') utterance.lang = 'ko-KR';
        else if(tgt === 'ja') utterance.lang = 'ja-JP';
        else if(tgt === 'zh-CN') utterance.lang = 'zh-CN';
        else if(tgt === 'zh-TW') utterance.lang = 'zh-HK'; 
        else if(tgt === 'es') utterance.lang = 'es-ES';
        else if(tgt === 'fr') utterance.lang = 'fr-FR';
        else if(tgt === 'de') utterance.lang = 'de-DE';
        else if(tgt === 'vi') utterance.lang = 'vi-VN';

        window.speechSynthesis.speak(utterance); 
    }

    renderSelectOptions();
</script>

</body>
</html>
